name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setting up NodeJS
        uses: actions/setup-node@v4
        with:
            node-version: 'lts/*'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: bun install

      - name: Check project with Astro
        run: bun run check

      - name: Lint project with Biome
        run: bun run lint

      - name: Check code format with Biome
        run: bun run format

      - name: Fetch organization repositories
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: bun run fetch-repos

      - name: Build site
        run: bun run build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
